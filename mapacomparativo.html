<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Comparativo - SGPD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f3f7fa; padding: 2rem; color: #1e293b; }
        .container { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; overflow: hidden; max-width: 1100px; margin: 0 auto; }
        .header { background: #1a365d; color: white; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1.25rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; }
        .best-offer { background: #f0fdf4; }
        .badge-winner { background: #22c55e; color: white; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
        .btn-action { background: #1a365d; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; text-decoration: none; font-size: 0.875rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div><p style="font-size:0.8rem; opacity:0.8">Prot #402</p><h2>Mapa Comparativo: Papel A4</h2></div>
            <a href="#" class="btn-action">Enviar para Aprovação</a>
        </div>
        <table>
            <thead>
                <tr><th>Fornecedor</th><th>Preço Unit.</th><th>Frete</th><th>Prazo</th><th>Total</th><th>Ação</th></tr>
            </thead>
            <tbody>
                <tr class="best-offer">
                    <td><strong>Papelaria Silva</strong> <span class="badge-winner">MELHOR PREÇO</span></td>
                    <td>R$ 22,50</td>
                    <td>Grátis</td>
                    <td>2 dias</td>
                    <td><strong>R$ 1.125,00</strong></td>
                    <td><input type="radio" checked></td>
                </tr>
                <tr>
                    <td>Office Express</td>
                    <td>R$ 24,90</td>
                    <td>R$ 30,00</td>
                    <td>1 dia</td>
                    <td>R$ 1.275,00</td>
                    <td><input type="radio"></td>
                </tr>
                <tr>
                    <td>Suprimentos S.A.</td>
                    <td>R$ 23,10</td>
                    <td>R$ 15,00</td>
                    <td>5 dias</td>
                    <td>R$ 1.170,00</td>
                    <td><input type="radio"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
