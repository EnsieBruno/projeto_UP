<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SGPD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f3f7fa; display: flex; height: 100vh; color: #1e293b; }
        
        /* Sidebar */
        .sidebar { width: 260px; background-color: #1a365d; color: #ffffff; padding: 2rem; position: fixed; height: 100%; }
        .logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 3rem; display: block; color: white; text-decoration: none; }
        .nav-item { color: #cbd5e1; text-decoration: none; padding: 0.75rem 1rem; margin-bottom: 0.5rem; border-radius: 0.5rem; display: flex; align-items: center; }
        .nav-item.active { background-color: #2c5282; color: #ffffff; }

        /* Main Content */
        .main-content { margin-left: 260px; flex: 1; padding: 2rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        
        .section-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; }
        
        /* Card Styles */
        .card { background: white; padding: 1.5rem; border-radius: 1rem; border: 1px solid #e2e8f0; width: 400px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .status { padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; background: #fef3c7; color: #92400e; margin-bottom: 1rem; display: inline-block; }
        
        /* Botões de Navegação */
        .button-group { display: flex; gap: 10px; margin-top: 1.5rem; }
        .btn-nav { 
            flex: 1;
            text-align: center;
            padding: 0.6rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn-mapa { background-color: #2c5282; color: white; }
        .btn-aprovacao { background-color: #16a34a; color: white; }
        .btn-nav:hover { opacity: 0.9; }

    </style>
</head>
<body>
    <nav class="sidebar">
        <a href="#" class="logo">SGPD</a>
        <a href="#" class="nav-item active">📊 Dashboard</a>
        <a href="#" class="nav-item">📝 Requisições</a>
        <a href="#" class="nav-item">⚖️ Aprovações</a>
    </nav>

    <main class="main-content">
        <header class="header">
            <div><h1>Dashboard</h1><p style="color:#64748b">Gerenciamento de Processos</p></div>
        </header>

        <h2 class="section-title">Aguardando Ação</h2>
        
        <div class="card">
            <p style="font-size:0.8rem; color:#64748b">Prot #402 • Requisição de Papel A4</p>
            <h3 style="margin: 0.5rem 0">Análise de Cotações</h3>
            <span class="status">Pendente</span>

            <div class="button-group">
                <a href="https://ensiebruno.github.io/projeto_UP/mapacomparativo.html" class="btn-nav btn-mapa">
                    Ver Mapa
                </a>

                <a href="https://ensiebruno.github.io/projeto_UP/paineldeaprovacao.html" class="btn-nav btn-aprovacao">
                    Ir para Aprovação
                </a>
            </div>
        </div>
    </main>
</body>
</html>
